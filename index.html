<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文章列表</title>
<style>
  :root {
    --bg: #000000;
    --bg-card: #0d0d1a;
    --text: #c8c4d0;
    --text-dim: #6a6a8a;
    --neon-blue: #3b82f6;
    --neon-purple: #8b5cf6;
    --neon-amber: #f59e0b;
    --border: rgba(59,130,246,.12);
    --glow: 0 0 10px rgba(59,130,246,.25);
    --max-w: 680px;
    --font-mono: "JetBrains Mono","Fira Code","Cascadia Code",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","PingFang SC",system-ui,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased
  }
  .hero{
    padding:64px 20px 48px;text-align:center;
    border-bottom:1px solid var(--border);position:relative;overflow:hidden
  }
  .hero::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,.06) 0%,transparent 50%),
               radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.04) 0%,transparent 50%);
    pointer-events:none
  }
  .hero::after{
    content:'';position:absolute;inset:0;
    background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none
  }
  .hero h1{
    font-size:1.8rem;font-weight:800;position:relative;z-index:1
  }
  .hero h1 .g{
    background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
  }
  .hero p{
    color:var(--text-dim);font-size:.85rem;margin-top:10px;position:relative;z-index:1
  }
  .wrap{max-width:var(--max-w);margin:0 auto;padding:32px 20px 60px}
  .list{display:flex;flex-direction:column;gap:10px}
  .card{
    display:flex;align-items:center;gap:16px;
    background:var(--bg-card);border:1px solid var(--border);
    padding:20px 24px;text-decoration:none;color:inherit;
    transition:all .3s;position:relative;overflow:hidden
  }
  .card::before{
    content:'';position:absolute;top:0;left:0;
    width:3px;height:100%;background:var(--neon-blue);
    opacity:0;transition:opacity .3s
  }
  .card:hover{
    border-color:rgba(59,130,246,.3);
    box-shadow:0 0 20px rgba(59,130,246,.08);
    transform:translateX(4px)
  }
  .card:hover::before{opacity:1}
  .card .num{
    width:28px;height:28px;
    border:1px solid var(--neon-blue);color:var(--neon-blue);
    display:flex;align-items:center;justify-content:center;
    font-size:.7rem;font-weight:700;flex-shrink:0;
    font-family:var(--font-mono)
  }
  .card .info{flex:1;min-width:0}
  .card .info .date{font-size:.7rem;color:var(--text-dim);margin-bottom:2px}
  .card .info h2{font-size:.95rem;font-weight:600;color:var(--text)}
  .card .info .desc{font-size:.78rem;color:var(--text-dim);margin-top:4px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .card .arrow{color:var(--text-dim);font-size:.8rem;flex-shrink:0;transition:all .3s}
  .card:hover .arrow{color:var(--neon-blue);transform:translateX(4px)}
  .empty{padding:60px 20px;text-align:center;color:var(--text-dim)}
  .empty .icon{font-size:2rem;margin-bottom:12px}
  @media(max-width:640px){
    .hero{padding:48px 16px 36px}
    .hero h1{font-size:1.4rem}
    .card{padding:16px 18px}
  }
</style>
</head>
<body>
<header class="hero">
  <h1><span class="g">📖 文章列表</span></h1>
  <p>AI · 科技 · 深度分析</p>
</header>
<div class="wrap"><div class="list" id="list"></div></div>
<script>
const articles=[
  {title:"AWS 要卖 AI 服务器了",date:"2026-05-10",file:"aws-ai-servers.html",desc:"AWS 的 AI 芯片业务正在出现一个关键转向。Amazon 已公开松口，可能把 Trainium 整柜系统直接卖给客户。"}
];
articles.sort((a,b)=>b.date.localeCompare(a.date));
const el=document.getElementById('list');
if(articles.length===0){el.innerHTML='<div class="empty"><div class="icon">📭</div><p>还没有文章</p></div>'}
else{
  el.innerHTML=articles.map((a,i)=>{
    const n=String(articles.length-i).padStart(2,'0');
    return '<a class="card" href="'+a.file+'"><div class="num">'+n+'</div><div class="info"><div class="date">'+a.date+'</div><h2>'+a.title+'</h2><div class="desc">'+a.desc+'</div></div><div class="arrow">→</div></a>'
  }).join('')
}
</script>
</body>
</html>
