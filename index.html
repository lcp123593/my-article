<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文章列表</title>
<style>
  :root {
    --bg: #f5f0e8;
    --bg-card: #ffffff;
    --text: #2c2c2c;
    --text-dim: #7a7a7a;
    --accent: #c9772e;
    --accent-soft: rgba(201,119,46,.10);
    --border: #e5ddd0;
    --shadow: 0 2px 8px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 16px rgba(0,0,0,.08);
    --max-w: 680px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;
    -webkit-font-smoothing:antialiased
  }
  header{
    padding:48px 20px 32px;text-align:center;
    border-bottom:1px solid var(--border)
  }
  header h1{
    font-size:1.6rem;font-weight:700;color:#1a1a1a
  }
  header p{
    color:var(--text-dim);font-size:.85rem;margin-top:6px
  }
  .wrap{max-width:var(--max-w);margin:0 auto;padding:28px 20px 60px}
  .list{display:flex;flex-direction:column;gap:8px}
  .card{
    display:flex;align-items:center;gap:14px;
    background:var(--bg-card);border:1px solid var(--border);
    padding:18px 22px;text-decoration:none;color:inherit;
    box-shadow:var(--shadow);transition:all .2s;
    border-radius:6px
  }
  .card:hover{
    border-color:var(--accent);box-shadow:var(--shadow-hover)
  }
  .card .num{
    width:30px;height:30px;border-radius:50%;
    background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:.75rem;font-weight:700;flex-shrink:0
  }
  .card .info{flex:1;min-width:0}
  .card .info .date{font-size:.72rem;color:var(--text-dim);margin-bottom:2px}
  .card .info h2{font-size:.95rem;font-weight:600;color:#1a1a1a}
  .card .info .desc{font-size:.78rem;color:var(--text-dim);margin-top:4px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .card .arrow{color:#ccc;font-size:.8rem;flex-shrink:0}
  .card:hover .arrow{color:var(--accent)}
  .empty{padding:60px 20px;text-align:center;color:var(--text-dim)}
  @media(max-width:640px){
    header{padding:36px 16px 24px}
    header h1{font-size:1.3rem}
    .card{padding:14px 16px}
  }
</style>
</head>
<body>
<header>
  <h1>📖 文章列表</h1>
  <p>AI · 科技 · 深度分析</p>
</header>
<div class="wrap"><div class="list" id="list"></div></div>
<script>
const articles=[
  {title:"AWS 要卖 AI 服务器了",date:"2026-05-10",file:"aws-ai-servers.html",desc:"AWS 的 AI 芯片业务正在出现一个关键转向。Amazon 已公开松口，可能把 Trainium 整柜系统直接卖给客户。"}
];
articles.sort((a,b)=>b.date.localeCompare(a.date));
const el=document.getElementById('list');
if(articles.length===0){el.innerHTML='<div class="empty"><p>还没有文章</p></div>'}
else{
  el.innerHTML=articles.map((a,i)=>{
    const n=String(articles.length-i).padStart(2,'0');
    return '<a class="card" href="'+a.file+'"><div class="num">'+n+'</div><div class="info"><div class="date">'+a.date+'</div><h2>'+a.title+'</h2><div class="desc">'+a.desc+'</div></div><div class="arrow">→</div></a>'
  }).join('')
}
</script>
</body>
</html>
